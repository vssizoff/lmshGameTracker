version: "3"
services:
  db:
    image: postgres:17.5-alpine3.21
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: "postgres"
      POSTGRES_DB: "postgres"
    healthcheck:
      test: "pg_isready -d postgres -U postgres"
      interval: 5s
      timeout: 60s
      retries: 20
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "54111:5432"
  backend:
    build: ./backend
    command: bun ./main.ts
    depends_on:
      minio:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      HOST: "0.0.0.0"
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: postgres
      NODE_ENV: production
  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
      target: server
    ports:
      - "54110:80"
    depends_on:
      - backend
volumes:
  db-data:
